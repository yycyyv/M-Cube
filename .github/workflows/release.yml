name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build ${{ matrix.platform.name }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            runner: windows-latest
            tauriArgs: ""
          - name: macOS
            runner: macos-latest
            tauriArgs: ""
          - name: Linux
            runner: ubuntu-latest
            # AppImage frequently fails on linuxdeploy in CI; build stable Linux packages only.
            tauriArgs: "--bundles deb,rpm"
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies (Tauri)
        if: matrix.platform.runner == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf
          # Ubuntu image differences: prefer 4.1 / ayatana, fallback to 4.0 / appindicator.
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev
          sudo apt-get install -y libayatana-appindicator3-dev || sudo apt-get install -y libappindicator3-dev
      
      - name: Verify sidecar binary output
        shell: bash
        run: |
          ls -la frontend/src-tauri/binaries || true

      - name: Install backend build dependencies
        # build_backend_sidecar.py invokes `sys.executable -m PyInstaller`,
        # so install runtime deps + pyinstaller into the active interpreter
        # (the one from setup-python, used by `python scripts/...`).
        # Cross-platform: export the locked deps to a file, then install.
        shell: bash
        run: |
          uv export --frozen --no-dev --no-hashes --format requirements-txt -o requirements.lock.txt
          uv pip install --system -r requirements.lock.txt pyinstaller

      - name: Build backend sidecar binary
        run: python scripts/build_backend_sidecar.py

      - name: Verify sidecar binary after build
        shell: bash
        run: |
          ls -la frontend/src-tauri/binaries || true
          file frontend/src-tauri/binaries/* || true

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          args: ${{ matrix.platform.tauriArgs }}
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: M-Cube ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: |
            Automated release for M-Cube.

            Assets are generated by GitHub Actions (Tauri build) for:
            - Windows (exe/msi)
            - macOS (app/dmg)
            - Linux (deb/rpm)
          releaseDraft: false
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, '-') }}

      - name: Show bundle outputs
        if: always()
        shell: bash
        run: |
          echo "== Bundles =="
          find frontend/src-tauri/target -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.app" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) 2>/dev/null || true
